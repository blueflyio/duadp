# =============================================================================
# UADP (Universal AI Discovery Protocol) - CI/CD Pipeline
# =============================================================================

include:
  - component: $CI_SERVER_FQDN/blueflyio/agent-platform/tools/gitlab_components/base-runner@release/v0.1.x
  - component: $CI_SERVER_FQDN/blueflyio/agent-platform/tools/gitlab_components/otel-instrument@release/v0.1.x
    inputs:
      service_name: uadp-reference-node
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.v2.gitlab-ci.yml
  - template: Code-Quality.gitlab-ci.yml

stages:
  - validate
  - test
  - build
  - security
  - publish
  - deploy

variables:
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE/reference-node

# ---------------------------------------------------------------------------
# Security Stage Overrides
# ---------------------------------------------------------------------------

sast:
  stage: security

secret_detection:
  stage: security

dependency-scanning:
  stage: security

# ---------------------------------------------------------------------------
# Validate Stage
# ---------------------------------------------------------------------------

validate:openapi:
  stage: validate
  image: node:22-alpine
  script:
    - npx @redocly/cli lint spec/openapi.yaml
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Test Stage
# ---------------------------------------------------------------------------

build:sdk:
  stage: test
  image: node:22-alpine
  script:
    - cd sdk/typescript
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - sdk/typescript/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

build:reference-node:
  stage: test
  image: node:22-alpine
  needs:
    - build:sdk
  script:
    - cd reference-node
    - npm ci --prefer-offline
    - npm run build
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Build Stage - Container Image
# ---------------------------------------------------------------------------

container_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build
        -t $CONTAINER_IMAGE:$CI_COMMIT_SHA
        -t $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
        -f reference-node/Dockerfile
        .
    - docker push $CONTAINER_IMAGE:$CI_COMMIT_SHA
    - docker push $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

container_scanning:
  stage: security
  variables:
    CS_IMAGE: $CONTAINER_IMAGE:$CI_COMMIT_SHA
  needs:
    - container_build
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Deploy Stage - Oracle K3s
# ---------------------------------------------------------------------------

deploy:oracle:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - container_build
  before_script:
    - mkdir -p ~/.kube
    - echo "$ORACLE_K3S_KUBECONFIG" > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - kubectl create namespace uadp --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl create secret docker-registry gitlab-registry-creds \
        --namespace=uadp \
        --docker-server=$CI_REGISTRY \
        --docker-username=$CI_REGISTRY_USER \
        --docker-password=$CI_REGISTRY_PASSWORD \
        --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl set image deployment/uadp-reference-node \
        uadp-reference-node=$CONTAINER_IMAGE:$CI_COMMIT_SHA \
        --namespace=uadp || echo "Deployment not found - apply manifests first"
  environment:
    name: oracle/uadp
    url: https://uadp.blueflyagents.com/uadp/v1/health
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
