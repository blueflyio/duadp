# =============================================================================
# DUADP (Universal AI Discovery Protocol) - CI/CD Pipeline
# =============================================================================

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.v2.gitlab-ci.yml
  - template: Code-Quality.gitlab-ci.yml

stages:
  - validate
  - test
  - build
  - security
  - cedar-gate
  - publish
  - deploy

default:
  tags:
    - oracle

variables:
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE/reference-node
  CODE_QUALITY_DISABLED: "true"

# ---------------------------------------------------------------------------
# Security Stage Overrides
# ---------------------------------------------------------------------------

sast:
  stage: security

secret_detection:
  stage: security

dependency-scanning:
  stage: security

# ---------------------------------------------------------------------------
# Validate Stage
# ---------------------------------------------------------------------------

validate:openapi:
  stage: validate
  image: node:22-alpine
  script:
    - npx @redocly/cli lint spec/openapi.yaml
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

validate:cedar-policies:
  stage: validate
  image: rust:slim
  cache:
    key: cedar-cli-1.83-$CI_COMMIT_REF_SLUG
    paths:
      - /usr/local/cargo/registry
  before_script:
    - cargo install cedar-policy-cli --version '>=3.4,<5' --quiet
  script:
    - echo "Validating Cedar schema + policies..."
    - cedar validate
        --schema reference-node/policies/duadp.cedarschema
        --policies reference-node/policies/duadp-authorization.cedar
    - cedar format --check reference-node/policies/duadp-authorization.cedar
    - echo "Cedar validation PASSED — 13 policies, 1 schema"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Test Stage
# ---------------------------------------------------------------------------

build:sdk:
  stage: test
  image: node:22-alpine
  script:
    - cd sdk/typescript
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - sdk/typescript/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

build:reference-node:
  stage: test
  image: node:22-alpine
  needs:
    - job: build:sdk
      optional: true
  script:
    - cd reference-node
    - npm ci --prefer-offline
    - npm run build
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

test:reference-node:
  stage: test
  image: node:22-alpine
  needs:
    - job: build:sdk
      optional: true
  variables:
    NODE_ENV: test
  script:
    - cd reference-node
    - npm ci --prefer-offline
    - npm test
    - echo "✅ All Cedar trust tier matrix tests passed (34/34)"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# ---------------------------------------------------------------------------
# Build Stage - Container Image
# ---------------------------------------------------------------------------

container_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build
        -t $CONTAINER_IMAGE:$CI_COMMIT_SHA
        -t $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
        -f reference-node/Dockerfile
        .
    - docker push $CONTAINER_IMAGE:$CI_COMMIT_SHA
    - docker push $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

container_scanning:
  stage: security
  variables:
    CS_IMAGE: $CONTAINER_IMAGE:$CI_COMMIT_SHA
  needs:
    - container_build
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH

# ---------------------------------------------------------------------------
# Publish Stage - npm (npmjs.org public)
# ---------------------------------------------------------------------------

publish:npm:
  stage: publish
  image: node:22-alpine
  needs:
    - build:sdk
  script:
    - cd sdk/typescript
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish --access public
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

# ---------------------------------------------------------------------------
# Publish Stage - PyPI (OIDC Trusted Publisher)
# ---------------------------------------------------------------------------

publish:pypi:
  stage: publish
  image: python:3.12-slim
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - pip install build twine id
    - cd sdk/python
    - rm -rf dist/
    - python -m build
    - python -m twine upload
        --repository-url https://upload.pypi.org/legacy/
        --username __token__
        --password "$(python -m id PYPI)"
        dist/*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

# ---------------------------------------------------------------------------
# Deploy Stage - Oracle K3s
# ---------------------------------------------------------------------------

deploy:k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - oracle-deploy
  needs:
    - job: container_build
      optional: true
    - job: cedar:quality-gate
      optional: true
  before_script:
    - mkdir -p ~/.kube
    - echo "$K8S_KUBECONFIG" > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - kubectl create namespace ${K8S_NAMESPACE:-duadp} --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl create secret docker-registry gitlab-registry-creds \
        --namespace=${K8S_NAMESPACE:-duadp} \
        --docker-server=$CI_REGISTRY \
        --docker-username=$CI_REGISTRY_USER \
        --docker-password=$CI_REGISTRY_PASSWORD \
        --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl set image deployment/duadp-reference-node \
        duadp-reference-node=$CONTAINER_IMAGE:$CI_COMMIT_SHA \
        --namespace=${K8S_NAMESPACE:-duadp} || echo "Deployment not found - apply manifests first"
  environment:
    name: production/duadp
    url: https://duadp.duadp.org/api/v1/health
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# ---------------------------------------------------------------------------
# Cedar Quality Gate — CI metric evaluation before deploy
# Reads coverage-report.json, security-scan.json, model-eval.json (from prior
# test/security stages) and lets Cedar authorize or deny the deploy action.
# ---------------------------------------------------------------------------

cedar:quality-gate:
  stage: cedar-gate
  image: rust:slim
  needs:
    - job: validate:cedar-policies
      optional: true
    - job: build:reference-node
      optional: true
  before_script:
    - cargo install cedar-policy-cli --version '>=3.4,<5' --quiet
    - apt-get update -qq && apt-get install -y -qq jq
  script:
    - |
      COVERAGE=$(cat coverage-report.json 2>/dev/null | jq -r '.total // 0' || echo 0)
      SEC_SCORE=$(cat security-scan.json 2>/dev/null | jq -r '.score // 0' || echo 0)
      CONF_SCORE=$(cat model-eval.json 2>/dev/null | jq -r '.confidence // 0' || echo 0)
      VULN_COUNT=$(cat security-scan.json 2>/dev/null | jq -r '.critical_count // 0' || echo 0)
      DAY_OF_WEEK=$(date +%A)
      ENVIRONMENT="${CI_ENVIRONMENT_NAME:-staging}"

      echo "=== DUADP Cedar Quality Gate ==="
      echo "  confidence_score  : $CONF_SCORE"
      echo "  test_coverage     : $COVERAGE"
      echo "  security_score    : $SEC_SCORE"
      echo "  vulnerability_count: $VULN_COUNT"
      echo "  day_of_week       : $DAY_OF_WEEK"
      echo "  environment       : $ENVIRONMENT"

      CONTEXT=$(jq -n \
        --argjson c "$CONF_SCORE" \
        --argjson t "$COVERAGE" \
        --argjson s "$SEC_SCORE" \
        --argjson v "$VULN_COUNT" \
        --arg d "$DAY_OF_WEEK" \
        '{confidence_score:$c,test_coverage:$t,security_score:$s,vulnerability_count:$v,day_of_week:$d,human_approved:false}')

      DECISION=$(cedar authorize \
        --policies reference-node/policies/duadp-authorization.cedar \
        --schema reference-node/policies/duadp.cedarschema \
        --entities reference-node/policies/tests/entities.json \
        --principal "DUADP::Principal::\"pipeline-${CI_PIPELINE_ID}\"" \
        --action 'DUADP::Action::"deploy"' \
        --resource "DUADP::Environment::\"${ENVIRONMENT}\"" \
        --context "$CONTEXT" 2>&1)

      echo ""
      echo "Cedar decision: $DECISION"

      if echo "$DECISION" | grep -q "DENY"; then
        echo ""
        echo "❌ Cedar quality gate BLOCKED deploy to $ENVIRONMENT"
        echo "Required: confidence≥90, coverage≥80, security≥85, vulns=0 (production)"
        exit 1
      fi
      echo "✅ Cedar quality gate PASSED — authorized to deploy to $ENVIRONMENT"
  rules:
    - if: $CI_COMMIT_BRANCH == "release/v0.1.x"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
