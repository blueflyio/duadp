# Entire CLI integration - session checkpoints
prepare-commit-msg:
  commands:
    entire-prepare:
      run: entire hooks git prepare-commit-msg {1} {2} 2>/dev/null || true

commit-msg:
  commands:
    entire-commit-msg:
      run: entire hooks git commit-msg {1} || exit 1

post-commit:
  commands:
    entire-post-commit:
      run: entire hooks git post-commit 2>/dev/null || true

pre-push:
  commands:
    entire-pre-push:
      run: entire hooks git pre-push {1} || true
