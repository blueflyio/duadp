services:
  duadp-node:
    build:
      context: ..
      dockerfile: reference-node/Dockerfile
    container_name: duadp-reference-node
    restart: unless-stopped
    ports:
      - "${PORT:-4200}:${PORT:-4200}"
    volumes:
      - duadp-data:/app/reference-node/data
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-4200}
      - DUADP_NODE_NAME=${DUADP_NODE_NAME:-My DUADP Node}
      - DUADP_BASE_URL=${DUADP_BASE_URL:-http://localhost:4200}
      - DUADP_NODE_ID=${DUADP_NODE_ID:-did:web:localhost}
      - DB_PATH=${DB_PATH:-./data/duadp.db}

volumes:
  duadp-data:
