version: '3.8'

# DUADP Federation — 3 nodes forming a federated discovery network
# Usage: docker compose -f docker-compose.federation.yml up --build

services:
  # Node 1: Main OSSA reference registry
  duadp-discover:
    build: ./reference-node
    ports:
      - "4200:4200"
    environment:
      PORT: "4200"
      DUADP_NODE_NAME: "DUADP Discovery Node"
      DUADP_NODE_ID: "did:web:discover.duadp.org"
      DUADP_BASE_URL: "http://duadp-discover:4200"
      DB_PATH: "./data/duadp.db"
      DUADP_SEED_FILE: "/app/seeds/discover-seed.json"
      DUADP_SEED_DOMAIN: "discover.duadp.org"
      DUADP_PEERS: "http://duadp-registry:4201,http://duadp-drupal:4202"
    volumes:
      - discover-data:/app/reference-node/data
      - ./seeds:/app/seeds:ro
    networks:
      - duadp-federation
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4200/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Node 2: OSSA specification agents & tools
  duadp-registry:
    build: ./reference-node
    ports:
      - "4201:4201"
    environment:
      PORT: "4201"
      DUADP_NODE_NAME: "OSSA Registry Node"
      DUADP_NODE_ID: "did:web:registry.openstandardagents.org"
      DUADP_BASE_URL: "http://duadp-registry:4201"
      DB_PATH: "./data/duadp.db"
      DUADP_SEED_FILE: "/app/seeds/registry-seed.json"
      DUADP_SEED_DOMAIN: "registry.openstandardagents.org"
      DUADP_PEERS: "http://duadp-discover:4200,http://duadp-drupal:4202"
    volumes:
      - registry-data:/app/reference-node/data
      - ./seeds:/app/seeds:ro
    networks:
      - duadp-federation
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4201/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Node 3: Drupal AI ecosystem discovery
  duadp-drupal:
    build: ./reference-node
    ports:
      - "4202:4202"
    environment:
      PORT: "4202"
      DUADP_NODE_NAME: "Drupal AI Discovery Node"
      DUADP_NODE_ID: "did:web:discover.drupl.ai"
      DUADP_BASE_URL: "http://duadp-drupal:4202"
      DB_PATH: "./data/duadp.db"
      DUADP_SEED_FILE: "/app/seeds/drupal-seed.json"
      DUADP_SEED_DOMAIN: "discover.drupl.ai"
      DUADP_PEERS: "http://duadp-discover:4200,http://duadp-registry:4201"
    volumes:
      - drupal-data:/app/reference-node/data
      - ./seeds:/app/seeds:ro
    networks:
      - duadp-federation
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4202/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  discover-data:
  registry-data:
  drupal-data:

networks:
  duadp-federation:
    driver: bridge
