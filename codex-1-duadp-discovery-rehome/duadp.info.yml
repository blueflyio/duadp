name: 'DUADP (Decentralized Universal AI Discovery Protocol)'
type: module
description: 'Implements the Decentralized Universal AI Discovery Protocol (DUADP) for federated discovery of agents, skills, and tools. Integrates with project_context_connector for AI-readable site snapshots, and N8N/Orchestration for fleet-wide automation.'
package: 'AI'
core_version_requirement: ^10.3 || ^11
dependencies:
  - drupal:node
  - drupal:http_client_manager
  - ai:ai
  - ai_agents:ai_agents
  - ai_agents_ossa:ai_agents_ossa
  - drupal:key
  # search_api is optional; used for local discovery indexing.
  # Intentionally designed to work with or without ai_agents_marketplace,
  # but assumes ai_agents_ossa is present to provide payload standards.

# Optional integrations — DUADP works without these but gains capabilities:
#   - project_context_connector: exposes /project-context-connector/snapshot in manifest
#   - orchestration: enables N8N fleet dispatch and external automation triggers
optional:
  - project_context_connector:project_context_connector
  - orchestration:orchestration

configure: duadp.settings
