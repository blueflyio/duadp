operations:
  ValidateOssaManifest:
    httpMethod: "POST"
    uri: "api/v1/compliance/ossa/validate"
    summary: "Validate an OSSA manifest via Compliance Engine."
    parameters:
      content-type:
        location: "header"
        default: "application/json"
      Authorization:
        location: "header"
        type: "string"
      manifest:
        type: "object"
        location: "json"
        description: "The OSSA manifest to validate"
      version:
        type: "string"
        location: "json"
        description: "Semver range for validation (e.g. ^0.4.0)"

  SemanticSearch:
    httpMethod: "POST"
    uri: "api/v1/search/semantic"
    summary: "Semantic search for agents via Agent Brain."
    parameters:
      content-type:
        location: "header"
        default: "application/json"
      Authorization:
        location: "header"
        type: "string"
      query:
        type: "string"
        location: "json"
        description: "Natural language search query"
        required: true
      collections:
        type: "array"
        location: "json"
        description: "Collections to search in"
      limit:
        type: "integer"
        location: "json"
        description: "Maximum number of results"
      scoreThreshold:
        type: "number"
        location: "json"
        description: "Minimum similarity score (0.0 - 1.0)"

  SendA2AMessage:
    httpMethod: "POST"
    uri: "message/send"
    summary: "Send an A2A log message (JSON-RPC 2.0)."
    parameters:
      content-type:
        location: "header"
        default: "application/json"
      jsonrpc:
        type: "string"
        location: "json"
        description: "JSON-RPC version"
        default: "2.0"
      id:
        type: "string"
        location: "json"
        description: "Request ID"
      method:
        type: "string"
        location: "json"
        description: "RPC method name"
        default: "message/send"
      params:
        type: "object"
        location: "json"
        description: "Message parameters"

  ComplianceHealthCheck:
    httpMethod: "GET"
    uri: "health"
    summary: "Check if Compliance Engine is available."

  VectorSearchHealthCheck:
    httpMethod: "GET"
    uri: "health"
    summary: "Check if Vector Search is available."
