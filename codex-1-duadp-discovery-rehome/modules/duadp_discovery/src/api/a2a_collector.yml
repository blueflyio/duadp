# A2A Log Collector API - POST /a2a/log for observability.
# base_uri is set in .http_services_api.yml (default) and synced from PlatformEndpointResolver via A2aCollectorConfigSubscriber.
# Schema matches agent-mesh A2A collector (camelCase).
operations:
  PostLog:
    httpMethod: "POST"
    uri: "a2a/log"
    summary: "Send a single A2A log entry to the collector for observability."
    parameters:
      messageId:
        type: "string"
        location: "json"
        required: true
      fromAgent:
        type: "string"
        location: "json"
        required: true
      toAgent:
        type: "string"
        location: "json"
        required: true
      messageType:
        type: "string"
        location: "json"
        required: true
      payload:
        type: "object"
        location: "json"
        required: true
      timestamp:
        type: "string"
        location: "json"
        required: true
      priority:
        type: "string"
        location: "json"
        required: false
      direction:
        type: "string"
        location: "json"
        required: false
      correlationId:
        type: "string"
        location: "json"
        required: false
