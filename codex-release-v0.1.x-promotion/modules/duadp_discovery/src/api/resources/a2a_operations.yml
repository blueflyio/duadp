operations:
  DiscoverAgent:
    httpMethod: "GET"
    uri: ".well-known/agent-card.json"
    summary: "Fetch a remote agent's Agent Card."
    parameters:
      accept:
        location: "header"
        default: "application/json"
    responseModel: "AgentCard"

  SendMessage:
    httpMethod: "POST"
    uri: "a2a"
    summary: "Send a JSON-RPC message/send request to a remote agent."
    parameters:
      content-type:
        location: "header"
        default: "application/json"
      jsonrpc:
        type: "string"
        location: "json"
        default: "2.0"
        required: true
      method:
        type: "string"
        location: "json"
        default: "message/send"
        required: true
      params:
        type: "object"
        location: "json"
        required: true
      id:
        type: "string"
        location: "json"
        required: true

  GetTask:
    httpMethod: "POST"
    uri: "a2a"
    summary: "Send a JSON-RPC tasks/get request to a remote agent."
    parameters:
      content-type:
        location: "header"
        default: "application/json"
      jsonrpc:
        type: "string"
        location: "json"
        default: "2.0"
        required: true
      method:
        type: "string"
        location: "json"
        default: "tasks/get"
        required: true
      params:
        type: "object"
        location: "json"
        required: true
      id:
        type: "string"
        location: "json"
        required: true

  CancelTask:
    httpMethod: "POST"
    uri: "a2a"
    summary: "Send a JSON-RPC tasks/cancel request to a remote agent."
    parameters:
      content-type:
        location: "header"
        default: "application/json"
      jsonrpc:
        type: "string"
        location: "json"
        default: "2.0"
        required: true
      method:
        type: "string"
        location: "json"
        default: "tasks/cancel"
        required: true
      params:
        type: "object"
        location: "json"
        required: true
      id:
        type: "string"
        location: "json"
        required: true

models:
  AgentCard:
    type: "object"
    location: "json"
    properties:
      name:
        type: "string"
      description:
        type: "string"
      url:
        type: "string"
      version:
        type: "string"
      skills:
        type: "array"
      capabilities:
        type: "object"
