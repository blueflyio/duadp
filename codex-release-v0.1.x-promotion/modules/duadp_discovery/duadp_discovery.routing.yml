duadp_discovery.settings:
  path: '/admin/config/services/duadp-discovery'
  defaults:
    _form: '\Drupal\duadp_discovery\Form\DuadpDiscoverySettingsForm'
    _title: 'DUADP Discovery Settings'
  requirements:
    _permission: 'administer duadp_discovery'

duadp_discovery.node_form:
  path: '/admin/config/services/duadp-discovery/nodes/{duadp_node}'
  defaults:
    _entity_form: 'duadp_node.default'
    _title: 'Edit DUADP Node'
  requirements:
    _permission: 'administer duadp_discovery'

duadp_discovery.node_collection:
  path: '/admin/config/services/duadp-discovery/nodes'
  defaults:
    _entity_list: 'duadp_node'
    _title: 'DUADP Registry Nodes'
  requirements:
    _permission: 'administer duadp_discovery'

duadp_discovery.sync:
  path: '/admin/config/services/duadp-discovery/sync'
  defaults:
    _controller: '\Drupal\duadp_discovery\Controller\DuadpSyncController::sync'
    _title: 'Sync to DUADP'
  requirements:
    _permission: 'administer duadp_discovery'
