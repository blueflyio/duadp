id: gateway_client
label: 'Agent Gateway Client'
api_path: /api/v1
base_url: '[config:ai_agents_client.settings:gateway_url]'
auth:
  plugin: bearer_token
  config:
    header_name: Authorization
    value: '[config:ai_agents_client.settings:api_token]'
request_options:
  timeout: '[config:ai_agents_client.settings:timeout]'
  connect_timeout: 10
  headers:
    User-Agent: 'Drupal OSSA Client/1.0'
    Accept: 'application/json'
commands:
  heartbeat:
    method: POST
    uri: /clients/heartbeat
  report_status:
    method: POST
    uri: /clients/report
  route_task:
    method: POST
    uri: /tasks/route
  health_check:
    method: GET
    uri: /health
  list_agents:
    method: GET
    uri: /agents
  get_agent:
    method: GET
    uri: /agents/{agent_id}
